name: 01 - Hello

on:
    push:
      branches: [main]

jobs:
    hello:
        runs-on: ubuntu-24.04
        steps:
            - name: Saludar
              run: echo "Hola desde Github Actions!"

            - name: Ver fecha del runner
              run: date

            - name: Ver archivos disponibles
              run: ls -la
