services:
  # 1. Servicio de Base de Datos (PostgreSQL)
  db:
    image: postgres:16-alpine # Usamos una versión estable y ligera
    restart: always           # Reiniciar el contenedor si falla
    environment:
      POSTGRES_USER: midu     # Usuario que espera server.js
      POSTGRES_PASSWORD: secreto # Contraseña de la BD
      POSTGRES_DB: midudb     # Nombre de la base de datos
    ports:
      - "5432:5432"           # Mapea el puerto al host por si quieres conectarte localmente
    volumes:
      - postgres_data:/var/lib/postgresql/data # Persistencia de datos
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U midu -d midudb"]
      interval: 5s
      timeout: 5s
      retries: 5


  # 2. Servicio de nuestra Aplicación Web (Node.js)
  web:
    build: .                  # Construye la imagen usando el Dockerfile de esta carpeta
    ports:
      - "3000:3000"           # Mapea el puerto 3000 del contenedor al puerto 3000 de tu máquina
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://midu:secreto@db:5432/midudb # URL de conexión
    depends_on:
      db:
        condition: service_healthy # Espera a que la BD esté completamente lista y "sana"

volumes:
  postgres_data:              # Definición del volumen persistente para la BD
